name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Git tag to package and release, for example v1.2.3
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: vars
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi
          if [ -z "${tag}" ]; then
            echo "tag is required" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Check out tagged source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/tags/${{ steps.vars.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build release archives
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          rm -rf dist
          mkdir -p dist
          version="${TAG#v}"

          for arch in amd64 arm64; do
            pkgdir="dist/package-${arch}"
            mkdir -p "${pkgdir}"

            CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" \
              go build -trimpath -ldflags='-s -w' -o "${pkgdir}/zip-forger" ./cmd/zip-forger

            cp README.md "${pkgdir}/README.md"

            tar -C "${pkgdir}" -czf "dist/zip-forger_${version}_linux_${arch}.tar.gz" .
            rm -rf "${pkgdir}"
          done

          (
            cd dist
            sha256sum zip-forger_*.tar.gz > sha256sum.txt
          )

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber
          else
            gh release create "${TAG}" dist/* --verify-tag --generate-notes --title "${TAG}"
          fi
